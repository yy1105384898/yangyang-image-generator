name: yangyang-image-generator
services:
  yangyang-image-generator:
    build: .
    image: yangyang-image-generator:latest
    container_name: yangyang-image-generator
    restart: unless-stopped
    environment:
      APP_USERNAME: ${APP_USERNAME:-root}
      APP_PASSWORD: ${APP_PASSWORD:-root}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret}
      NEW_API_BASE: ${NEW_API_BASE:-http://new-api:3000}
      NEW_API_TOKEN: ${NEW_API_TOKEN:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-image-2}
      AVAILABLE_MODELS: ${AVAILABLE_MODELS:-gpt-image-2,gpt-image-1.5,gpt-image-1,nano-banana-pro,nano-banana-2,qwen3.6-plus-image,imagen-4,qwen3.6-plus-image-edit}
      MAX_HISTORY: "200"
      REQUEST_TIMEOUT: "600"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
      newapi:
      lan:
        ipv4_address: 192.168.10.200

  yangyang-image-generator-proxy:
    image: python:3.12-alpine
    container_name: yangyang-image-generator-proxy
    restart: unless-stopped
    depends_on:
      - yangyang-image-generator
    command:
      - python
      - -c
      - |
        import select, socket, threading
        TARGET = ("yangyang-image-generator", 3012)
        def pipe(client):
            upstream = socket.create_connection(TARGET, timeout=10)
            sockets = [client, upstream]
            try:
                while True:
                    readable, _, _ = select.select(sockets, [], [], 60)
                    for source in readable:
                        data = source.recv(65536)
                        if not data:
                            return
                        (upstream if source is client else client).sendall(data)
            finally:
                client.close()
                upstream.close()
        server = socket.socket()
        server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
        server.bind(("0.0.0.0", 3012))
        server.listen(128)
        while True:
            client, _ = server.accept()
            threading.Thread(target=pipe, args=(client,), daemon=True).start()
    ports:
      - "3012:3012"
    networks:
      - default

networks:
  newapi:
    external: true
    name: newapi_new-api-network

  lan:
    external: true
    name: lan-macvlan
